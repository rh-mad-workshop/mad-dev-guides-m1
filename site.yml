runtime:
  cache_dir: ./.cache/antora

site:
  title: Modern Application Development Roadshow - Dev Track
  start_page: mad-dev-guides-m1::1-introduction.adoc

content:
  sources:
    - url: .
      branches: ocp-4.15
      start_path: documentation

asciidoc:
  attributes:
    experimental: true
    page-pagination: true
    openshift-password: openshift
  extensions:
    - ./lib/remote-include-processor.js
    - ./lib/tab-block.js

ui:
  bundle:
    url: https://github.com/redhat-developer-demos/rhd-tutorial-ui/releases/download/v0.1.10/ui-bundle.zip
    snapshot: true
  supplemental_files: ./supplemental-ui

output:
  dir: ./gh-pages
